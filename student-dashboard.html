<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        
        <header class="glass-panel dash-header">
            <h2>🎓 Student Information System</h2>
            <div class="time-display">🕒 <span id="liveClock">Loading...</span></div>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </header>

        <section class="top-section">
            
            <div class="glass-panel profile-card">
                <div class="avatar-wrapper">
                    <img id="viewPhoto" src="https://via.placeholder.com/150" alt="Student Photo">
                </div>
                <h3 class="profile-name" id="viewName">Loading...</h3>
                <p class="profile-dept">AI & Data Science</p> <span class="badge" id="viewAccommodation">Loading...</span>
            </div>

            <div class="stats-grid">
                <div class="glass-panel stat-box">
                    <span class="stat-label">CGPA</span>
                    <span class="stat-value" id="viewCgpa">--</span>
                </div>
                <div class="glass-panel stat-box">
                    <span class="stat-label">Attendance</span>
                    <span class="stat-value" id="viewAttendance">--</span>
                </div>
                <div class="glass-panel stat-box">
                    <span class="stat-label">Age</span>
                    <span class="stat-value" id="viewAge">--</span>
                </div>
                <div class="glass-panel stat-box">
                    <span class="stat-label">DOB</span>
                    <span class="stat-value" id="viewDobHeader">--</span>
                </div>
            </div>
            
        </section>

        <section class="glass-panel details-card">
            <h3 class="section-title">Student Information</h3>
            <ul class="info-list">
                <li class="info-item">
                    <span class="info-label">👤 Full Name</span>
                    <span class="info-value" id="viewFullName">--</span>
                </li>
                <li class="info-item">
                    <span class="info-label">🆔 Roll Number</span>
                    <span class="info-value" id="viewRollNo">--</span>
                </li>
                <li class="info-item">
                    <span class="info-label">🎓 Register No</span>
                    <span class="info-value" id="viewRegNo">--</span>
                </li>
                <li class="info-item">
                    <span class="info-label">📞 Phone Number</span>
                    <span class="info-value" id="viewPhone">--</span>
                </li>
                <li class="info-item">
                    <span class="info-label">👨 Parent Name</span>
                    <span class="info-value" id="viewParentName">--</span>
                </li>
                <li class="info-item">
                    <span class="info-label">📱 Parent Phone</span>
                    <span class="info-value" id="viewParentPhone">--</span>
                </li>
                <li class="info-item">
                    <span class="info-label">🏠 Address</span>
                    <span class="info-value" id="viewAddress">--</span>
                </li>
            </ul>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // Live Clock Function
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const firebaseConfig = {
            apiKey: "AIzaSyB_tyQr722blDSsbcHYZrlIgB-kXfb309M",
            authDomain: "student-portal-406ac.firebaseapp.com",
            projectId: "student-portal-406ac",
            storageBucket: "student-portal-406ac.firebasestorage.app",
            messagingSenderId: "9138034883",
            appId: "1:9138034883:web:87ddbe10ba4cb4c730ea76",
            measurementId: "G-5GZW2T36P4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function solveAgeMetric(dobStringValue) {
            const birthDate = new Date(dobStringValue);
            const today = new Date();
            let solvedAge = today.getFullYear() - birthDate.getFullYear();
            const monthDifference = today.getMonth() - birthDate.getMonth();
            if (monthDifference < 0 || (monthDifference === 0 && today.getDate() < birthDate.getDate())) {
                solvedAge--;
            }
            return solvedAge;
        }

        // Format Date to looks like "08 Sep 2007"
        function formatDate(dateString) {
            if(!dateString) return "---";
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-GB', options);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const activeRollNo = sessionStorage.getItem('activeRollNo');

            if (!isLoggedIn || !activeRollNo) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const docRef = doc(db, "students", activeRollNo);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // Maps fields values directly onto UI tokens
                    document.getElementById('viewName').innerText = data.fullName || "---";
                    document.getElementById('viewFullName').innerText = data.fullName || "---";
                    document.getElementById('viewRegNo').innerText = data.regNo || "---";
                    document.getElementById('viewRollNo').innerText = activeRollNo;
                    
                    document.getElementById('viewDobHeader').innerText = formatDate(data.dob);
                    
                    document.getElementById('viewPhone').innerText = data.phoneNumber || "---";
                    document.getElementById('viewAddress').innerText = data.address || "---";
                    document.getElementById('viewParentName').innerText = data.parentName || "---";
                    document.getElementById('viewParentPhone').innerText = data.parentNumber || "---";
                    document.getElementById('viewCgpa').innerText = data.cgpa || "0.00";
                    document.getElementById('viewAttendance').innerText = data.attendance ? data.attendance + "%" : "0%";
                    document.getElementById('viewAccommodation').innerText = data.accommodation || "Day Scholar";
                    
                    if (data.dob) {
                        document.getElementById('viewAge').innerText = solveAgeMetric(data.dob) + " Years";
                    }
                    if (data.photoUrl && data.photoUrl.trim() !== "") {
                        document.getElementById('viewPhoto').src = data.photoUrl;
                    }
                } else {
                    alert("System Link Broken: No document payload found inside Firestore database.");
                }
            } catch (err) {
                console.error("Critical rendering error: ", err);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
